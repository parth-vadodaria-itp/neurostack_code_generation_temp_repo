<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple Hello World HTML page">
  <title>Hello World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <div class="card">
      <div class="icon">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="2" fill="none"/>
          <path d="M32 20v24M20 32h24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="title">Hello World</h1>
      <p class="subtitle">Welcome to your first HTML page</p>
      <div class="info">
        <p>This is a simple, clean HTML page demonstrating basic web structure and styling.</p>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="showMessage()">Click Me</button>
        <a href="https://developer.mozilla.org/en-US/docs/Web/HTML" class="btn btn-secondary" target="_blank" rel="noopener noreferrer">Learn HTML</a>
      </div>
      <div id="message" class="message hidden"></div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2024 Hello World Project</p>
  </footer>

  <script>
    function showMessage() {
      const messageEl = document.getElementById('message');
      const messages = [
        'Hello from JavaScript!',
        'You clicked the button!',
        'Welcome to web development!',
        'Keep learning and building!',
        'HTML + CSS + JS = ❤️'
      ];
      const randomMessage = messages[Math.floor(Math.random() * messages.length)];
      messageEl.textContent = randomMessage;
      messageEl.classList.remove('hidden');
      
      setTimeout(() => {
        messageEl.classList.add('hidden');
      }, 3000);
    }
  </script>
</body>
</html>
